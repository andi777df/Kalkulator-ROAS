<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          var customFetch = originalFetch;
          
          var fetchDescriptor = {
            get: function() {
              return customFetch;
            },
            set: function(val) {
              customFetch = val;
            },
            configurable: true,
            enumerable: true
          };

          try {
            Object.defineProperty(window, 'fetch', fetchDescriptor);
          } catch (e1) {
            try {
              var proto = Object.getPrototypeOf(window);
              if (proto) {
                Object.defineProperty(proto, 'fetch', fetchDescriptor);
              }
            } catch (e2) {
              console.warn("Failed to define fetch on prototype:", e2);
            }
          }

          if (typeof globalThis !== 'undefined' && globalThis !== window) {
            try {
              Object.defineProperty(globalThis, 'fetch', fetchDescriptor);
            } catch (e3) {}
          }
        } catch (e) {
          console.warn("Failed to patch window.fetch:", e);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
